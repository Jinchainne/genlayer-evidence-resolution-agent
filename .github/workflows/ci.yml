name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install frontend deps
        run: npm ci

      - name: Install test deps
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: GenLayer config check
        run: npm run genlayer:check

      - name: Contract check
        run: npm run contract:check

      - name: Typecheck
        run: npm run typecheck

      - name: Direct tests
        run: python -m pytest tests/direct -v
